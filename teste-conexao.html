<!DOCTYPE html>
<html>
<head>
    <title>Teste Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Teste de Conexão</h1>
    <div id="status">Testando...</div>
    <div id="detalhe"></div>

    <script>
        const SUPABASE_URL = 'https://owxqzyrrhmwsmgimasiw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BgL7QBUEzeHOlWd5KNo0EQ_t3dF8aMu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function testar() {
            document.getElementById('status').innerHTML = '🟡 Conectando ao Supabase...';
            
            try {
                // Teste 1: Verificar se o cliente foi criado
                if (!supabase) {
                    throw new Error('Cliente Supabase não criado');
                }
                
                // Teste 2: Tentar ler a tabela perfis
                const { data, error, status } = await supabase
                    .from('perfis')
                    .select('count', { count: 'exact', head: true });
                
                if (error) {
                    document.getElementById('status').innerHTML = '🔴 ERRO';
                    document.getElementById('detalhe').innerHTML = `
                        <b>Erro:</b> ${error.message}<br>
                        <b>Código:</b> ${error.code}<br>
                        <b>Status:</b> ${status}<br>
                        <br>
                        <b>Solução:</b><br>
                        - Verifique se https://smolcklinux.github.io está no Site URL do Supabase<br>
                        - Verifique se a chave anônima está correta
                    `;
                } else {
                    document.getElementById('status').innerHTML = '🟢 CONECTADO!';
                    document.getElementById('detalhe').innerHTML = `Status: ${status} - Conexão funcionando!`;
                }
                
            } catch (err) {
                document.getElementById('status').innerHTML = '🔴 ERRO FATAL';
                document.getElementById('detalhe').innerHTML = `Erro: ${err.message}`;
            }
        }
        
        testar();
    </script>
</body>
</html>
