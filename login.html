<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dorgs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 350px;
        }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .error { color: red; margin-bottom: 1rem; text-align: center; }
        .success { color: green; margin-bottom: 1rem; text-align: center; }
        a { color: #667eea; text-decoration: none; }
        .link { text-align: center; margin-top: 1rem; }
        .status { text-align: center; margin-bottom: 1rem; font-size: 0.8rem; }
        .online { color: #00ff88; }
        .offline { color: #ff4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐶 Dorgs</h1>
        <div class="status" id="status">🟢 Conectando...</div>
        <div id="message"></div>
        <input type="text" id="username" placeholder="Nome de usuário">
        <input type="password" id="password" placeholder="Senha">
        <button id="btnLogin">Entrar</button>
        <div class="link"><a href="cadastro.html">Criar conta →</a></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://owxqzyrrhmwsmgimasiw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BgL7QBUEzeHOlWd5KNo0EQ_t3dF8aMu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verificar status
        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            try {
                const { error } = await supabase.from('perfis').select('count', { count: 'exact', head: true });
                if (!error) {
                    statusDiv.innerHTML = '🟢 Servidor ONLINE';
                    statusDiv.className = 'status online';
                } else {
                    statusDiv.innerHTML = '🔴 Servidor OFFLINE';
                    statusDiv.className = 'status offline';
                }
            } catch {
                statusDiv.innerHTML = '🔴 Servidor OFFLINE';
                statusDiv.className = 'status offline';
            }
        }
        checkStatus();

        document.getElementById('btnLogin').onclick = async () => {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('btnLogin');

            if (!username || !password) {
                msg.innerHTML = '<div class="error">Preencha todos os campos</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';

            try {
                // Buscar o email do usuário
                const { data: perfil, error: perfilError } = await supabase
                    .from('perfis')
                    .select('id')
                    .eq('username', username)
                    .maybeSingle();

                if (perfilError || !perfil) {
                    throw new Error('Usuário não encontrado');
                }

                // Tentar login com email interno
                const email = `${username}@dorgs.local`;
                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw new Error('Senha incorreta');

                msg.innerHTML = '<div class="success">Login realizado! Redirecionando...</div>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                msg.innerHTML = `<div class="error">${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        };
    </script>
</body>
</html>
