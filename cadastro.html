<script type="module">
    import { supabase } from './supabase-config.js';
    
    // Força da senha
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    
    passwordInput.addEventListener('input', () => {
        const pwd = passwordInput.value;
        let strength = 0;
        if (pwd.length >= 6) strength++;
        if (pwd.length >= 8) strength++;
        if (/[A-Z]/.test(pwd)) strength++;
        if (/[0-9]/.test(pwd)) strength++;
        
        const width = (strength / 4) * 100;
        strengthBar.style.width = width + '%';
        strengthBar.style.background = strength <= 1 ? '#ff4757' : strength <= 2 ? '#ffa502' : '#2ed573';
    });
    
    // Olho para ver senha
    const togglePassword = document.getElementById('togglePassword');
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
    });
    
    // Cadastro
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.toLowerCase().trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('registerBtn');
        const messageArea = document.getElementById('messageArea');
        
        messageArea.innerHTML = '';
        
        // Validações
        if (username.length < 3) {
            showMessage('Usuário deve ter pelo menos 3 caracteres', 'error');
            return;
        }
        
        if (password.length < 6) {
            showMessage('Senha deve ter pelo menos 6 caracteres', 'error');
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Criando conta...';
        
        try {
            // 🔥 CORREÇÃO: Verificar se usuário já existe
            const { data: existing } = await supabase
                .from('perfis')
                .select('username')
                .eq('username', username)
                .maybeSingle();
            
            if (existing) {
                throw new Error('Nome de usuário já está em uso');
            }
            
            // 🔥 CORREÇÃO: Criar email interno
            const emailInterno = `${username}@dorgs.local`;
            
            console.log('Criando usuário:', username);
            console.log('Email interno:', emailInterno);
            console.log('Senha:', password);
            
            // Criar usuário no auth
            const { data, error } = await supabase.auth.signUp({
                email: emailInterno,
                password: password,
                options: {
                    data: {
                        username: username
                    }
                }
            });
            
            if (error) {
                console.error('Erro do Supabase:', error);
                throw new Error(error.message);
            }
            
            if (!data.user) {
                throw new Error('Erro ao criar usuário');
            }
            
            console.log('Usuário criado, ID:', data.user.id);
            
            // Criar perfil manualmente
            const { error: perfilError } = await supabase
                .from('perfis')
                .insert({
                    id: data.user.id,
                    username: username,
                    nome_publico: username,
                    bio: 'Novo por aqui! 🚀'
                });
            
            if (perfilError) {
                console.error('Erro ao criar perfil:', perfilError);
                // Se falhou, deleta o usuário para não ficar inconsistente
                await supabase.auth.admin.deleteUser(data.user.id);
                throw new Error('Erro ao criar perfil');
            }
            
            showMessage('Conta criada! Redirecionando...', 'success');
            setTimeout(() => {
                window.location.href = 'perfil.html';
            }, 1500);
            
        } catch (error) {
            console.error('Erro completo:', error);
            showMessage(error.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Criar conta';
        }
    });
    
    function showMessage(msg, type) {
        const div = document.createElement('div');
        div.className = type === 'error' ? 'error-message' : 'success-message';
        div.textContent = msg;
        document.getElementById('messageArea').innerHTML = '';
        document.getElementById('messageArea').appendChild(div);
    }
</script>
