<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Dorgs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 350px;
        }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .error { color: red; margin-bottom: 1rem; text-align: center; }
        .success { color: green; margin-bottom: 1rem; text-align: center; }
        a { color: #667eea; text-decoration: none; }
        .link { text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🐶 Cadastro</h1>
        <div id="message"></div>
        <input type="text" id="username" placeholder="Nome de usuário">
        <input type="password" id="password" placeholder="Senha (mínimo 6 caracteres)">
        <button id="btnCadastrar">Criar conta</button>
        <div class="link"><a href="login.html">Já tenho conta →</a></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://owxqzyrrhmwsmgimasiw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BgL7QBUEzeHOlWd5KNo0EQ_t3dF8aMu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('btnCadastrar').onclick = async () => {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if (username.length < 3) {
                msg.innerHTML = '<div class="error">Usuário precisa ter 3+ caracteres</div>';
                return;
            }
            if (password.length < 6) {
                msg.innerHTML = '<div class="error">Senha precisa ter 6+ caracteres</div>';
                return;
            }

            const btn = document.getElementById('btnCadastrar');
            btn.disabled = true;
            btn.textContent = 'Criando...';

            try {
                // 1. Verificar se usuário já existe
                const { data: existe } = await supabase
                    .from('perfis')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (existe) throw new Error('Usuário já existe');

                // 2. Criar usuário no auth
                const email = `${username}@dorgs.local`;
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { username: username } }
                });

                if (error) throw new Error(error.message);

                // 3. Criar perfil
                const { error: perfilError } = await supabase
                    .from('perfis')
                    .insert({
                        id: data.user.id,
                        username: username,
                        nome_publico: username
                    });

                if (perfilError) throw new Error('Erro ao criar perfil');

                msg.innerHTML = '<div class="success">Conta criada! Redirecionando...</div>';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (err) {
                msg.innerHTML = `<div class="error">${err.message}</div>`;
                btn.disabled = false;
                btn.textContent = 'Criar conta';
            }
        };
    </script>
</body>
</html>
