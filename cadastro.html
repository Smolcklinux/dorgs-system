<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Dorgs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .register-card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { color: #666; font-size: 0.85rem; margin-top: 0.25rem; }
        h2 { text-align: center; margin-bottom: 0.5rem; color: #1a1a2e; }
        .subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.85rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; font-size: 0.85rem; }
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s;
            padding-right: 3rem;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            color: #999;
            background: none;
            border: none;
        }
        .register-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .register-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .login-link { text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e0e0e0; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error-message { background: #fee; color: #c33; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.8rem; text-align: center; }
        .success-message { background: #e8f5e9; color: #2e7d32; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.8rem; text-align: center; }
        .password-strength { height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 0.5rem; }
        .strength-bar { height: 100%; width: 0%; border-radius: 2px; transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <h1>🐶 Dorgs</h1>
            <p>crie sua conta</p>
        </div>

        <h2>Criar conta</h2>
        <p class="subtitle">Escolha um nome de usuário e senha</p>

        <div id="messageArea"></div>

        <form id="registerForm">
            <div class="input-group">
                <label>👤 Nome de usuário</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="ex: joaosilva" required autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label>🔒 Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="mínimo 6 caracteres" required>
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <button type="submit" class="register-btn" id="registerBtn">Criar conta</button>
        </form>

        <div class="login-link">
            <p>Já tem uma conta? <a href="login.html">Fazer login →</a></p>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        import { signUpWithUsername } from './auth.js';

        // Força da senha
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        
        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            let strength = 0;
            if (pwd.length >= 6) strength++;
            if (pwd.length >= 8) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            
            const width = (strength / 4) * 100;
            strengthBar.style.width = width + '%';
            strengthBar.style.background = strength <= 1 ? '#ff4757' : strength <= 2 ? '#ffa502' : '#2ed573';
        });

        // Olho para ver senha
        const togglePassword = document.getElementById('togglePassword');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Cadastro
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            const messageArea = document.getElementById('messageArea');
            
            messageArea.innerHTML = '';
            
            if (username.length < 3) {
                showMessage('Usuário deve ter pelo menos 3 caracteres', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Criando conta...';
            
            try {
                await signUpWithUsername(username, password);
                showMessage('Conta criada! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'perfil.html';
                }, 1500);
            } catch (error) {
                showMessage(error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Criar conta';
            }
        });
        
        function showMessage(msg, type) {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = msg;
            document.getElementById('messageArea').innerHTML = '';
            document.getElementById('messageArea').appendChild(div);
        }
    </script>
</body>
</html>
