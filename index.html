<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorgs - Rede Social</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo"><h2>🐶 Dorgs</h2></div>
                <div class="nav-links">
                    <a href="index.html" class="nav-link active">🏠 Início</a>
                    <a href="perfil.html" class="nav-link">👤 Perfil</a>
                    <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="container">
                <aside class="sidebar-left">
                    <div class="user-card">
                        <div class="user-avatar-large" id="userAvatar">👤</div>
                        <h3 id="userName">Carregando...</h3>
                        <p id="userBio">@usuario</p>
                        <div class="user-stats">
                            <div class="stat">
                                <span class="stat-number" id="postsCount">0</span>
                                <span class="stat-label">Posts</span>
                            </div>
                        </div>
                    </div>
                </aside>

                <div class="feed-container">
                    <div class="create-post-card">
                        <div class="post-input-area">
                            <div class="user-avatar-mini" id="miniAvatar">👤</div>
                            <textarea id="postContent" placeholder="O que está acontecendo?..." maxlength="500" rows="3"></textarea>
                        </div>
                        <div class="post-actions">
                            <span class="char-counter"><span id="charCount">0</span>/500</span>
                            <button id="publishBtn" class="publish-btn">Publicar 🚀</button>
                        </div>
                    </div>

                    <div class="feed-header"><h3>📰 Feed de Notícias</h3></div>
                    <div id="postsFeed" class="posts-feed"><div class="loading-spinner">Carregando posts...</div></div>
                </div>

                <aside class="sidebar-right">
                    <div class="info-card">
                        <h4>💡 Sobre o Dorgs</h4>
                        <p>Rede social moderna e rápida criada para conectar pessoas.</p>
                        <hr>
                        <h4>📌 Dicas</h4>
                        <ul><li>Compartilhe ideias</li><li>Curta posts legais</li><li>Conecte-se com amigos</li></ul>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
