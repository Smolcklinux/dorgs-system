<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Dorgs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff4757 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        .profile-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        .profile-header {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1rem;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            color: white;
        }

        .profile-header h2 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .profile-header p {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin: 1.5rem 0;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .posts-title {
            margin-bottom: 1rem;
        }

        .posts-title h3 {
            color: white;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
            color: #333;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid #e8e8e8;
            color: #666;
            font-size: 0.85rem;
        }

        .empty-posts {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }
            .nav-links {
                width: 100%;
                justify-content: center;
            }
            .profile-header {
                padding: 1.5rem;
            }
            .profile-stats {
                gap: 1.5rem;
            }
            .stat-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2>🐶 Dorgs</h2>
                </div>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">🏠 Início</a>
                    <a href="perfil.html" class="nav-link active">👤 Perfil</a>
                    <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
                </div>
            </div>
        </nav>
        
        <div class="profile-container">
            <a href="index.html" class="back-link">
                ← Voltar para o feed
            </a>
            
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <h2 id="profileName">Carregando...</h2>
                <p id="profileBio"></p>
                <div class="profile-stats">
                    <div class="stat-box">
                        <div class="stat-number" id="profilePostsCount">0</div>
                        <div class="stat-label">Posts</div>
                    </div>
                </div>
            </div>
            
            <div class="posts-title">
                <h3>📝 Meus Posts</h3>
            </div>
            <div id="userPosts">
                <div class="loading-spinner" style="color:white; text-align:center;">Carregando...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';
        import { getCurrentUser, logout } from './auth.js';

        async function loadProfile() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const { data: perfil } = await supabase
                .from('perfis')
                .select('*')
                .eq('id', user.id)
                .single();

            const nome = perfil?.username || user.email.split('@')[0];
            const bio = perfil?.bio || 'Olá! Estou usando o Dorgs 🚀';
            const inicial = nome.charAt(0).toUpperCase();

            document.getElementById('profileAvatar').textContent = inicial;
            document.getElementById('profileName').textContent = nome;
            document.getElementById('profileBio').textContent = bio;

            const { data: posts, count } = await supabase
                .from('posts')
                .select('*', { count: 'exact' })
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            document.getElementById('profilePostsCount').textContent = count || 0;

            const container = document.getElementById('userPosts');
            
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-posts">
                        📝 Você ainda não fez nenhum post<br>
                        <a href="index.html" style="color: #667eea;">Voltar ao feed e publicar algo</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-content">
                        <p>${escapeHtml(post.conteudo)}</p>
                    </div>
                    <div class="post-stats">
                        <span>❤️ ${post.curtidas || 0} curtidas</span>
                        <span>📅 ${new Date(post.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await logout();
            window.location.href = 'login.html';
        });

        loadProfile();
    </script>
</body>
</html>
