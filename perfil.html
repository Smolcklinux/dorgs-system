<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Dorgs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 2rem auto;
            border-radius: 1rem;
        }

        .logo h2 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }

        .nav-links a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .avatar {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 3rem;
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }

        .username {
            text-align: center;
            color: #667eea;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input, .input-wrapper textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .input-wrapper input:focus, .input-wrapper textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .input-wrapper textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            color: #999;
            background: none;
            border: none;
        }

        .section-title {
            font-size: 1rem;
            color: #1a1a2e;
            margin: 1.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .save-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            text-align: center;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
            .profile-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <h2>🐶 Dorgs</h2>
        </div>
        <div class="nav-links">
            <a href="index.html">🏠 Início</a>
            <a href="perfil.html" class="active">👤 Perfil</a>
            <button id="logoutBtn" class="logout-btn">🚪 Sair</button>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="avatar">
                <div class="avatar-circle" id="avatarPreview">👤</div>
            </div>

            <h2 id="nomePublicoDisplay">Carregando...</h2>
            <p class="username" id="usernameDisplay">@carregando</p>

            <div id="messageArea"></div>

            <form id="profileForm">
                <div class="input-group">
                    <label>📛 Nome público</label>
                    <div class="input-wrapper">
                        <input type="text" id="nomePublico" placeholder="Como você quer ser chamado">
                    </div>
                </div>

                <div class="input-group">
                    <label>📝 Sobre você</label>
                    <div class="input-wrapper">
                        <textarea id="bio" placeholder="Conte um pouco sobre você..."></textarea>
                    </div>
                </div>

                <div class="section-title">🔐 Segurança</div>

                <div class="input-group">
                    <label>🔒 Nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="novaSenha" placeholder="Deixe em branco para manter a atual">
                        <button type="button" class="toggle-password" id="toggleNovaSenha">👁️</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>✓ Confirmar nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmarSenha" placeholder="Digite a nova senha novamente">
                        <button type="button" class="toggle-password" id="toggleConfirmarSenha">👁️</button>
                    </div>
                </div>

                <button type="submit" class="save-btn" id="saveBtn">Salvar alterações</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        let userId = null;

        async function loadUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            userId = user.id;
            
            // Carregar dados do perfil
            const { data: perfil } = await supabase
                .from('perfis')
                .select('username, nome_publico, bio')
                .eq('id', userId)
                .single();
            
            if (perfil) {
                const nomeExibicao = perfil.nome_publico || perfil.username;
                document.getElementById('nomePublicoDisplay').textContent = nomeExibicao;
                document.getElementById('usernameDisplay').textContent = `@${perfil.username}`;
                document.getElementById('nomePublico').value = perfil.nome_publico || '';
                document.getElementById('bio').value = perfil.bio || '';
                
                const inicial = nomeExibicao.charAt(0).toUpperCase();
                document.getElementById('avatarPreview').textContent = inicial;
            }
        }

        loadUser();

        // Toggle para mostrar senha
        const toggleNovaSenha = document.getElementById('toggleNovaSenha');
        const toggleConfirmarSenha = document.getElementById('toggleConfirmarSenha');
        const novaSenhaInput = document.getElementById('novaSenha');
        const confirmarSenhaInput = document.getElementById('confirmarSenha');

        toggleNovaSenha.addEventListener('click', () => {
            const type = novaSenhaInput.type === 'password' ? 'text' : 'password';
            novaSenhaInput.type = type;
            toggleNovaSenha.textContent = type === 'password' ? '👁️' : '🙈';
        });

        toggleConfirmarSenha.addEventListener('click', () => {
            const type = confirmarSenhaInput.type === 'password' ? 'text' : 'password';
            confirmarSenhaInput.type = type;
            toggleConfirmarSenha.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        // Salvar perfil e trocar senha
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nomePublico = document.getElementById('nomePublico').value.trim();
            const bio = document.getElementById('bio').value.trim();
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            const btn = document.getElementById('saveBtn');
            const messageArea = document.getElementById('messageArea');
            
            messageArea.innerHTML = '';
            btn.disabled = true;
            btn.textContent = 'Salvando...';
            
            try {
                // 1. Atualizar perfil
                const updateData = {};
                if (nomePublico) updateData.nome_publico = nomePublico;
                if (bio) updateData.bio = bio;
                
                if (Object.keys(updateData).length > 0) {
                    const { error } = await supabase
                        .from('perfis')
                        .update(updateData)
                        .eq('id', userId);
                    
                    if (error) throw new Error('Erro ao atualizar perfil');
                }
                
                // 2. Trocar senha se fornecida
                if (novaSenha || confirmarSenha) {
                    if (novaSenha !== confirmarSenha) {
                        throw new Error('As novas senhas não coincidem');
                    }
                    if (novaSenha.length < 6) {
                        throw new Error('A senha deve ter pelo menos 6 caracteres');
                    }
                    
                    const { error } = await supabase.auth.updateUser({
                        password: novaSenha
                    });
                    
                    if (error) throw new Error('Erro ao alterar senha: ' + error.message);
                    
                    // Limpar campos de senha
                    document.getElementById('novaSenha').value = '';
                    document.getElementById('confirmarSenha').value = '';
                }
                
                showMessage('✅ Perfil atualizado com sucesso!', 'success');
                
                // Recarregar dados
                await loadUser();
                
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar alterações';
            }
        });
        
        function showMessage(msg, type) {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = msg;
            document.getElementById('messageArea').innerHTML = '';
            document.getElementById('messageArea').appendChild(div);
            
            setTimeout(() => {
                if (document.getElementById('messageArea').firstChild === div) {
                    div.remove();
                }
            }, 3000);
        }
    </script>
</body>
</html>
